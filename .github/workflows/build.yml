name: build.yml

permissions:
  contents: read
  actions: read  # Required for setup-python and other actions to read action metadata

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}

jobs:

  windows:
    name: Build on Windows
    runs-on: windows-latest
    permissions:
      contents: read
      issues: write  # Required for actions/github-script to create issues on test failure
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        python-version: [ '3.11', '3.12', '3.13', '3.14' ]

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Cache uv dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-windows-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-windows-

      - name: Create virtual environment and install dependencies
        run: |
          uv venv venv
          . venv/Scripts/activate
          uv pip install -e ".[dev]"

      - name: Check and fix with Ruff
        run: |
          . venv/Scripts/activate
          ruff check ./tests/*.py ./openseries/*.py --fix --exit-non-zero-on-fix

      - name: Format with Ruff
        run: |
          . venv/Scripts/activate
          ruff format

      - name: Type check with Mypy
        run: |
          . venv/Scripts/activate
          mypy .

      - name: Tests with Pytest
        id: pytest
        continue-on-error: true
        run: |
          . venv/Scripts/activate
          PYTHONPATH=${PWD} pytest

      - name: Create GitHub issue on failure
        if: ${{ steps.pytest.outcome == 'failure' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GH_OWNER: ${{ github.repository_owner }}
          GH_REPO: ${{ github.event.repository.name }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const { GH_OWNER, GH_REPO, GH_RUN_URL } = process.env;
            await github.rest.issues.create({
              owner: GH_OWNER,
              repo: GH_REPO,
              title: `Tests failed on ${new Date().toDateString()}`,
              body: `See the full logs here: ${GH_RUN_URL}`,
            });

      - name: Fail job if tests failed
        if: ${{ steps.pytest.outcome == 'failure' }}
        run: exit 1

      - name: Package and check
        run: |
          . venv/Scripts/activate
          uv build
          uvx twine check dist/*

  ubuntu:
    name: Build on Ubuntu
    needs: windows
    runs-on: ubuntu-latest
    permissions:
