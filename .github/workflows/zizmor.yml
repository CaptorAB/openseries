name: zizmor.yml

permissions:
  contents: read
  actions: read  # Required for setup-uv and other actions to read action metadata

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  UV_VERSION: "0.11.21"
  ZIZMOR_VERSION: "1.25.2"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  zizmor:
    name: Run zizmor audit
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # Required for github/codeql-action/upload-sarif to upload SARIF results
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.sha }}
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: ${{ env.UV_VERSION }}

      - name: Run zizmor audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZIZMOR_VERSION: ${{ env.ZIZMOR_VERSION }}
        run: uvx zizmor==${ZIZMOR_VERSION} --strict-collection --pedantic .

      - name: Generate zizmor SARIF report
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ZIZMOR_VERSION: ${{ env.ZIZMOR_VERSION }}
        run: uvx zizmor==${ZIZMOR_VERSION} --strict-collection --pedantic --format=sarif . > results.sarif

      - name: Upload SARIF file
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
          category: zizmor
