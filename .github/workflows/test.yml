name: tests.yml

permissions:
  contents: read
  actions: read  # Required for setup-python and other actions to read action metadata

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch: {}
  push:
    branches:
      - "*"
      - "*/*"
      - "**"

jobs:
  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    environment: codecov
    defaults:
      run:
        shell: bash
    permissions:
      issues: write  # Required for actions/github-script to create issues on test failure

    steps:
      - name: Check out GitHub repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: '.python-version'

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Create virtual environment and install dependencies
        run: |
          uv venv venv
          . venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Check and fix with Ruff
        run: |
          . venv/bin/activate
          ruff check ./tests/*.py ./openseries/*.py --fix --exit-non-zero-on-fix

      - name: Format with Ruff
        run: |
          . venv/bin/activate
          ruff format

      - name: Manage Mypy cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: mypy-cache
        with:
          path: .mypy_cache
          key: mypy-cache-${{ hashFiles('**/*.py') }}
          restore-keys: mypy-cache-

      - name: Type check with Mypy
        run: |
          . venv/bin/activate
          mypy --cache-dir .mypy_cache .

      - name: Tests with Pytest
        id: pytest
        continue-on-error: true
        run: |
          . venv/bin/activate
          PYTHONPATH=${PWD} pytest

      - name: Create GitHub issue on failure
        if: ${{ steps.pytest.outcome == 'failure' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GH_OWNER: ${{ github.repository_owner }}
          GH_REPO: ${{ github.event.repository.name }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const owner = process.env.GH_OWNER;
            const repo = process.env.GH_REPO;
            const runUrl = process.env.GH_RUN_URL;

            await github.rest.issues.create({
              owner,
              repo,
              title: `Tests failed on ${new Date().toDateString()}`,
              body: `See the full logs here: ${runUrl}`,
            });

      - name: Fail job if tests failed
        if: ${{ steps.pytest.outcome == 'failure' }}
        run: exit 1

      - name: Upload test results to Codecov
        if: ${{ github.ref_name == 'master' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit.xml
          report_type: test_results
          verbose: true

      - name: Upload coverage to Codecov
        if: ${{ github.ref_name == 'master' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: CaptorAB/openseries
          files: coverage.xml
          verbose: true
