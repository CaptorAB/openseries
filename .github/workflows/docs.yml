name: docs.yml

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  # Only run on pushes to master for documentation-related changes
  # This prevents running on every commit, only when docs actually change
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - '.readthedocs.yaml'
  # Manual trigger for immediate updates (e.g., after releases)
  workflow_dispatch: {}

jobs:
  build-and-deploy:
    name: Build and deploy documentation
    defaults:
      run:
        shell: bash
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      pages: write  # Required for actions/deploy-pages to deploy to GitHub Pages
      id-token: write  # Required for OIDC token for GitHub Pages deployment
    environment:
      name: github-pages

    steps:
      - name: Check out GitHub repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          ref: ${{ (github.event_name == 'workflow_dispatch' && github.ref) || github.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        id: setup_python
        with:
          python-version-file: '.python-version'

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Manage uv cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.UV_CACHE_DIR }}
          key: uv-cache-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-cache-${{ runner.os }}-

      - name: Create virtual environment and install dependencies
        run: |
          uv venv venv
          . venv/bin/activate
          uv pip install -e ".[docs]"

      - name: Build documentation
        run: |
          . venv/bin/activate
          cd docs
          make builddocs

      - name: Check for documentation warnings
        run: |
          . venv/bin/activate
          cd docs
          # Build with warnings as errors to catch issues
          make strict || {
            echo "Documentation build failed with warnings/errors:"
            echo "This indicates potential issues that should be fixed."
            exit 1
          }

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
