name: release-publish.yml

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  UV_VERSION: "0.11.16"
  UV_PROJECT_ENVIRONMENT: venv

on:
  workflow_call:
    inputs:
      tag_version:
        required: true
        type: string

jobs:
  build_dist:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/tags/${{ inputs.tag_version }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: false

      - name: Verify lockfile
        run: uv lock --check

      - name: Build distributions (sdist + wheel)
        run: |
          set -euo pipefail
          uv build
          uvx twine check dist/*
          (cd dist && sha256sum *.whl *.tar.gz > SHA256SUMS && cat SHA256SUMS)

      - name: Upload dist artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish_testpypi:
    name: Publish to TestPyPI
    needs: build_dist
    if: ${{ needs.build_dist.result == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/openseries/
    permissions:
      contents: read
      id-token: write  # Required for pypa/gh-action-pypi-publish OIDC trusted publishing
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Verify distribution checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum -c SHA256SUMS

      - name: Publish distributions to TestPyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish_pypi:
    name: Publish to PyPI
    needs: publish_testpypi
    if: ${{ needs.publish_testpypi.result == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/openseries/
    permissions:
      contents: read
      id-token: write  # Required for pypa/gh-action-pypi-publish OIDC trusted publishing
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      - name: Verify distribution checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum -c SHA256SUMS

      - name: Publish distributions to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          skip-existing: true

  trigger_docs_update:
    name: Trigger documentation update
    needs: publish_pypi
    if: ${{ needs.publish_pypi.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write  # Required for actions.createWorkflowDispatch to trigger docs workflow
    steps:
      - name: Trigger documentation update
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docs.yml',
              ref: 'master'
            });
            console.log('Documentation update workflow triggered');
